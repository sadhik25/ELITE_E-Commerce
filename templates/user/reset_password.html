<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password - SmartCart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-wrapper animate">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 1.25rem;">
            <h1 class="auth-title" style="color: var(--text); font-size: 2rem; margin-bottom: 0.25rem;">
                {% if role == 'admin' %}Admin {% endif %}New Password</h1>
            <p class="auth-subtitle" style="font-size: 0.85rem; opacity: 0.7;">Enter your new secure password.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/reset-password">
            <div class="form-group-bespoke" style="margin-bottom: 2rem;">
                <label>New Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock"
                        style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--primary); opacity: 0.5;"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required
                        style="padding-left: 3.5rem;">
                </div>
            </div>

            <div class="form-group-bespoke" style="margin-bottom: 3.5rem;">
                <label>Confirm Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock"
                        style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--primary); opacity: 0.5;"></i>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required
                        style="padding-left: 3.5rem;">
                </div>
            </div>

            <button type="submit" class="btn-buy-bespoke" style="width: 100%; padding: 1.5rem; border-radius: 16px;">Set
                New Password</button>
        </form>
    </div>

    <script>
        setTimeout(() => {
            const flashes = document.querySelectorAll('.flash');
            flashes.forEach(f => {
                f.style.opacity = '0';
                f.style.transform = 'translateY(-20px)';
                setTimeout(() => f.remove(), 600);
            });
        }, 4000);
    </script>
</body>

</html>
