<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SmartCart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-wrapper animate">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 1rem;">
            <h1 class="auth-title" style="color: var(--text); font-size: 1.85rem; margin-bottom: 0.25rem;">
                {% if role == 'admin' %}Admin {% endif %}Reset Password</h1>
            <p class="auth-subtitle" style="font-size: 0.85rem; opacity: 0.7;">Enter your email to receive a safe code.
            </p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/forgot-password">
            <div class="form-group-bespoke" style="margin-bottom: 3.5rem;">
                <label>Email Address</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-at"
                        style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--primary); opacity: 0.5;"></i>
                    <input type="email" name="email" placeholder="Enter your email" required
                        style="padding-left: 3.5rem;">
                </div>
            </div>

            <button type="submit" class="btn-buy-bespoke"
                style="width: 100%; padding: 1.5rem; border-radius: 16px;">Send OTP</button>
        </form>

        <div style="margin-top: 4rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2.5rem;">
            <a href="{% if role == 'admin' %}/admin-login{% else %}/user-login{% endif %}"
                style="color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">&larr;
                Back to Login</a>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const flashes = document.querySelectorAll('.flash');
            flashes.forEach(f => {
                f.style.opacity = '0';
                f.style.transform = 'translateY(-20px)';
                setTimeout(() => f.remove(), 600);
            });
        }, 4000);
    </script>
</body>

</html>
