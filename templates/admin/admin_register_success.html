<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - Elite Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-wrapper animate">
    <div class="auth-card"
        style="padding: 6rem 4rem; text-align: center; border: none; box-shadow: 0 40px 100px rgba(0,0,0,0.4);">
        <div
            style="width: 100px; height: 100px; background: rgba(16, 185, 129, 0.1); border: 2px solid var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 3rem; color: var(--success); font-size: 3rem;">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1 style="font-size: 2.5rem; color: var(--text); margin-bottom: 2rem; letter-spacing: -1px; font-weight: 800;">
            Registration Successful!</h1>
        <p
            style="color: var(--text-dim); font-size: 1.1rem; line-height: 1.6; margin-bottom: 4rem; max-width: 450px; margin-inline: auto;">
            Your account is pending Super Admin approval. Please wait for authorization.
        </p>

        <div style="border-top: 1px solid var(--border); padding-top: 3rem;">
            <a href="/"
                style="color: var(--primary); text-decoration: none; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; font-size: 0.85rem;">Return
                to Homepage</a>
        </div>
    </div>
</body>

</html>
